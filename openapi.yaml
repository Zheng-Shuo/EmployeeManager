        gender:
          $ref: "#/components/schemas/Gender"
        birthDate:
          $ref: "#/components/schemas/DateString"
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        hireDate:
          $ref: "#/components/schemas/DateString"
        status:
          $ref: "#/components/schemas/EmployeeStatus"
        orgUnitIds:
          type: string
          description: 组织 ID 列表，支持 JSON 数组字符串或逗号分隔
        primaryOrgUnitId:
          type: string
        photo:
          type: string
          format: binary
        attachments:
          type: array
          items:
            type: string
            format: binary

    AssignDepartmentsRequest:
      type: object
      required:
        - orgUnitIds
      properties:
        orgUnitIds:
          type: array
          items:
            $ref: "#/components/schemas/UuidString"
        primaryOrgUnitId:
