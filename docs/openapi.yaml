openapi: 3.0.3
info:
  title: Employee Manager Server API
  description: 员工管理系统后端 API 文档
  version: 0.3.0

servers:
  - url: http://localhost:10086
    description: 本地开发服务器

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: 认证相关接口
  - name: Users
    description: 用户与用户角色管理接口
  - name: Roles
    description: 角色与权限接口
  - name: Employees
    description: 员工档案与归属关系接口
  - name: Organizations
    description: 组织架构接口
  - name: Positions
    description: 职位字典接口
  - name: Dictionaries
    description: 数据字典管理接口

paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseLoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
              example:
                success: false
                code: AUTH_401_INVALID_CREDENTIALS
                message: 用户名或密码错误
                data: null
        "403":
          description: 账号已被禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
              example:
                success: false
                code: AUTH_403_ACCOUNT_DISABLED
                message: 账号已被禁用
                data: null
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: 刷新访问令牌
      description: 使用 refresh token 换取新的 access token 和 refresh token（旧 refresh token 立即失效）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: refresh token 无效或已过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
              example:
                success: false
                code: AUTH_401_INVALID_REFRESH_TOKEN
                message: 无效的刷新令牌
                data: null
        "403":
          description: 账号已被禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
              example:
                success: false
                code: AUTH_403_ACCOUNT_DISABLED
                message: 账号已被禁用
                data: null
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: 登出
      description: 撤销指定的 refresh token。该操作只会使 refresh token 失效，已签发的 access token 在自然过期前仍可继续访问受保护接口。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/password:
    put:
      tags:
        - Auth
      summary: 修改当前登录用户密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/users:
    get:
      tags:
        - Users
      summary: 获取用户列表
      description: 需要权限 user:view
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserDTOList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags:
        - Users
      summary: 创建用户
      description: 需要权限 user:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/users/{id}/reset-password:
    post:
      tags:
        - Users
      summary: 重置用户密码
      description: 需要权限 user:reset-password
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "200":
          description: 重置成功，返回临时密码
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseResetPasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/users/{id}/username:
    patch:
      tags:
        - Users
      summary: 修改用户名
      description: 需要权限 user:update
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsernameRequest"
      responses:
        "200":
          description: 修改成功，返回更新后的用户信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/users/{id}/status:
    patch:
      tags:
        - Users
      summary: 更新用户状态
      description: 需要权限 user:update。不能修改自己的状态。禁用时自动撤销该用户的所有 refresh token。
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusRequest"
      responses:
        "200":
          description: 更新成功，返回更新后的用户信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 不能修改自己的状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
        "422":
          description: 状态值无效（仅支持 ACTIVE / DISABLED）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/users/{id}:
    delete:
      tags:
        - Users
      summary: 删除用户
      description: 需要权限 user:delete。不能删除自己，不能删除拥有 ADMIN 角色的用户。级联删除用户角色关联和 refresh token。
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 不能删除自己或不能删除管理员用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/roles:
    get:
      tags:
        - Roles
      summary: 获取角色列表
      description: 需要权限 role:view
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRoleDTOList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags:
        - Roles
      summary: 创建角色
      description: 需要权限 role:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRoleDetailDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/roles/{id}:
    get:
      tags:
        - Roles
      summary: 获取角色详情
      description: 需要权限 role:view
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRoleDetailDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags:
        - Roles
      summary: 更新角色
      description: 需要权限 role:update
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRoleDetailDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags:
        - Roles
      summary: 删除角色
      description: 需要权限 role:delete
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/permissions:
    get:
      tags:
        - Roles
      summary: 获取权限列表
      description: 需要权限 permission:view
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePermissionDTOList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/users/{userId}/roles:
    get:
      tags:
        - Users
      summary: 获取用户角色编码列表
      description: 需要权限 user:view
      parameters:
        - $ref: "#/components/parameters/UuidUserIdPath"
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseStringList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags:
        - Users
      summary: 分配用户角色
      description: 需要权限 user:update
      parameters:
        - $ref: "#/components/parameters/UuidUserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRolesRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/employees:
    get:
      tags:
        - Employees
      summary: 分页查询员工
      description: 需要权限 employee:view
      parameters:
        - name: page
          in: query
          description: 页码，从 1 开始
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: 每页条数
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: keyword
          in: query
          description: 按姓名或工号模糊搜索
          schema:
            type: string
        - name: status
          in: query
          description: 员工状态过滤
          schema:
            $ref: "#/components/schemas/EmployeeStatus"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePageResponseEmployeeDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags:
        - Employees
      summary: 创建员工
      description: 需要权限 employee:create。支持 application/json 和 multipart/form-data（可上传照片与多个附件）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateEmployeeMultipartRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseEmployeeDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/employees/{id}:
    get:
      tags:
        - Employees
      summary: 获取员工详情
      description: 需要权限 employee:view
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseEmployeeDetailDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags:
        - Employees
      summary: 更新员工
      description: 需要权限 employee:update。支持 application/json 和 multipart/form-data（可上传照片与多个附件）
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeMultipartRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseEmployeeDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags:
        - Employees
      summary: 删除员工
      description: 需要权限 employee:delete
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/organizations:
    get:
      tags:
        - Organizations
      summary: 获取组织列表
      description: 需要权限 org:view；当 tree=true 时返回树形结构
      parameters:
        - name: tree
          in: query
          description: 是否返回树形结构
          schema:
            type: boolean
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiResponseOrgUnitDTOList"
                  - $ref: "#/components/schemas/ApiResponseOrgUnitTreeNodeList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags:
        - Organizations
      summary: 创建组织单元
      description: 需要权限 org:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgUnitRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOrgUnitDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/organizations/{id}:
    get:
      tags:
        - Organizations
      summary: 获取组织单元详情
      description: 需要权限 org:view
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOrgUnitDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags:
        - Organizations
      summary: 更新组织单元
      description: 需要权限 org:update
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrgUnitRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOrgUnitDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags:
        - Organizations
      summary: 删除组织单元
      description: 需要权限 org:delete
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/organizations/{id}/actions/move:
    post:
      tags:
        - Organizations
      summary: 移动组织单元（修改父节点）
      description: |
        需要权限 org:update。
        传 parentId 为目标父节点 UUID，传 null 则移动为根节点。
