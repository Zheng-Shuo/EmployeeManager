  # ── 数据字典 ─────────────────────────────────────────────────────────

  /api/dictionaries:
    get:
      tags:
        - Dictionaries
      summary: 获取字典分类列表
      description: |
        仅需登录认证，无额外权限要求。支持通过 orgUnitId 过滤。
        默认返回字典分类基础信息；当 include=items 时返回分类及其字典项明细。
      parameters:
        - name: orgUnitId
          in: query
          schema:
            $ref: "#/components/schemas/UuidString"
          required: false
          description: 组织单元 ID，传入时返回全局分类 + 该组织的分类
        - name: include
          in: query
          required: false
          schema:
            type: string
            enum: [items]
          description: 返回扩展内容。传入 items 时返回分类及其字典项明细。
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiResponseDictionaryCategoryList"
                  - $ref: "#/components/schemas/ApiResponseDictionaryCategoryDetailList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags:
        - Dictionaries
      summary: 创建字典分类
      description: 需要权限 dictionary:manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictionaryCategoryDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/dictionaries/{id}:
    get:
      tags:
        - Dictionaries
      summary: 获取字典分类详情（含字典项）
      description: 仅需登录认证，无额外权限要求
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictionaryCategoryDetailDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags:
        - Dictionaries
      summary: 更新字典分类
      description: 需要权限 dictionary:manage。系统内置分类不允许修改名称。
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictionaryCategoryDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags:
        - Dictionaries
      summary: 删除字典分类
      description: 需要权限 dictionary:manage。系统内置分类不允许删除。删除分类时自动级联删除其下所有字典项。
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/dictionaries/{id}/items:
    post:
      tags:
        - Dictionaries
      summary: 添加字典项
      description: 需要权限 dictionary:manage
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictionaryItemDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/dictionaries/{id}/items/{itemId}:
    put:
      tags:
        - Dictionaries
      summary: 更新字典项
      description: 需要权限 dictionary:manage
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
        - name: itemId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: 字典项 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictionaryItemDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags:
        - Dictionaries
      summary: 删除字典项
      description: 需要权限 dictionary:manage。直接物理删除字典项。如需禁用而非删除，请使用 PATCH /{id}/items/{itemId}/disable 接口。
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
        - name: itemId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: 字典项 ID
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/dictionaries/{id}/items/{itemId}/disable:
    patch:
      tags:
        - Dictionaries
      summary: 禁用字典项
      description: 需要权限 dictionary:manage。将字典项设为禁用状态（isEnabled=false）。已禁用的字典项不能重复禁用。
      parameters:
        - $ref: "#/components/parameters/UuidIdPath"
        - name: itemId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: 字典项 ID
      responses:
        "200":
          description: 禁用成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictionaryItemDTO"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 字典项已处于禁用状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UuidIdPath:
      name: id
      in: path
      required: true
      description: UUID 标识符
      schema:
        $ref: "#/components/schemas/UuidString"

    UuidUserIdPath:
      name: userId
      in: path
      required: true
      description: 用户 UUID
      schema:
        $ref: "#/components/schemas/UuidString"

  responses:
    NoContent:
      description: 成功，无响应体

    BadRequest:
      description: 请求参数、UUID 或请求体格式无效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponseError"
          example:
            success: false
            code: COMMON_400_INVALID_REQUEST_BODY
            message: 请求体格式无效
            data: null

    Unauthorized:
      description: 未认证或令牌无效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponseError"
          example:
            success: false
            code: AUTH_401_NOT_AUTHENTICATED
            message: 未认证
            data: null

    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponseError"
          example:
            success: false
            code: AUTH_403_PERMISSION_DENIED
            message: 权限不足
            data: null

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponseError"
          example:
            success: false
            code: USER_404_NOT_FOUND
            message: 资源不存在
            data: null

    Conflict:
      description: 资源状态冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponseError"
          example:
            success: false
            code: USER_409_USERNAME_EXISTS
            message: 资源状态冲突
            data: null

    ValidationError:
      description: 业务校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponseError"
          example:
            success: false
            code: AUTH_422_OLD_PASSWORD_WRONG
            message: 业务校验失败
            data: null

    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponseError"
          example:
            success: false
            code: COMMON_500_INTERNAL_ERROR
            message: 服务器内部错误
            data: null

  schemas:
    UuidString:
      type: string
      format: uuid
      example: 00000000-0000-0000-0000-000000000001

    TimestampString:
      type: string
      example: 2025-01-01 08:00:00

    DateString:
      type: string
      format: date
      description: ISO 8601 日期字符串，格式 YYYY-MM-DD
      example: 2025-01-01

    UserStatus:
      type: string
      description: "用户账号状态 \u2014 ACTIVE 正常 | DISABLED 禁用"
      enum:
        - ACTIVE
        - DISABLED

    EmployeeStatus:
      type: string
      description: "员工状态字典项 ID（UUID），值来源于数据字典 employee_status 分类下的字典项"

    Gender:
      type: string
      description: "性别 \u2014 MALE 男 | FEMALE 女"
      enum:
        - MALE
        - FEMALE

    OrgUnitType:
      type: string
      description: "组织类型，值来源于数据字典 org_unit_type（默认: COMPANY 公司 | DEPARTMENT 部门）"

    ApiResponseMeta:
      type: object
      required:
        - success
        - code
        - message
      properties:
        success:
          type: boolean
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: OK

    ApiResponseError:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          properties:
            success:
              type: boolean
              example: false
            code:
              type: string
              example: COMMON_400_INVALID_REQUEST_BODY
            message:
              type: string
              example: 请求体格式无效
            data:
              type: object
              nullable: true
              description: 始终为 null

    ApiResponseLoginResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/LoginResponse"

    ApiResponseRefreshResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/RefreshResponse"

    ApiResponseUserDTO:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/UserDTO"

    ApiResponseUserDTOList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserDTO"

    ApiResponseResetPasswordResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/ResetPasswordResponse"

    ApiResponseRoleDTOList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/RoleDTO"

    ApiResponseRoleDetailDTO:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/RoleDetailDTO"

    ApiResponsePermissionDTOList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PermissionDTO"

    ApiResponseStringList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                type: string

    ApiResponseEmployeeDTO:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/EmployeeDTO"

    ApiResponseEmployeeDetailDTO:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/EmployeeDetailDTO"

    ApiResponsePageResponseEmployeeDTO:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/PageResponseEmployeeDTO"

    ApiResponseOrgUnitDTO:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/OrgUnitDTO"

    ApiResponseOrgUnitDTOList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/OrgUnitDTO"

    ApiResponseOrgUnitTreeNodeList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/OrgUnitTreeNode"

    ApiResponsePositionDTO:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/PositionDTO"

    ApiResponsePositionDTOList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PositionDTO"

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: 5kuslvhe9n

    LoginResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - userId
        - username
        - roles
        - permissions
        - forcePasswordChange
      properties:
        accessToken:
          type: string
          description: 短期访问令牌（JWT 格式，15 分钟有效）
        refreshToken:
          type: string
